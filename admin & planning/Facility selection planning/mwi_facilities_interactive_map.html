
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Malawi Facilities Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
  html, body, #map { height: 100%; margin: 0; }
  #controls {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(255,255,255,0.95); padding: 12px; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); max-width: 320px; font-family: system-ui, sans-serif; font-size: 14px;
  }
  #controls h3 { margin: 0 0 8px 0; font-size: 16px; }
  #controls .row { margin-top: 8px; }
  #controls select { width: 100%; min-height: 80px; }
  #controls button { margin-top: 8px; width: 100%; padding: 8px; border: 0; border-radius: 8px; background:#2563eb; color: #fff; cursor: pointer; }
  #controls button.secondary { background: #10b981; }
  #controls button.outline { background: #fff; color:#111; border: 1px solid #ddd; }
  #controls .small { font-size: 12px; color: #555; margin-top: 6px; }
  #footer {
    position: absolute; bottom: 10px; left: 12px; z-index: 1000; background: rgba(255,255,255,0.9);
    padding: 6px 10px; border-radius: 8px; font-family: system-ui, sans-serif; font-size: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.15);
  }
  .fav-icon { background: transparent; border: none; font-size: 20px; line-height: 20px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .fav-yes { color: #f59e0b; }
</style>
</head>
<body>
<div id="map"></div>

<div id="controls">
  <h3>Filter facilities</h3>
  <div class="row">
    <label><b>Facility type</b> (multi-select)</label>
    <select id="typeFilter" multiple>
      <option value="Central Hospital">Central Hospital</option>
<option value="Clinic">Clinic</option>
<option value="Dispensary">Dispensary</option>
<option value="District Hospital">District Hospital</option>
<option value="Health Centre">Health Centre</option>
<option value="Health Post">Health Post</option>
<option value="Hospital?">Hospital?</option>
<option value="Maternity">Maternity</option>
<option value="Other Hospital">Other Hospital</option>
<option value="Rural/Community Hospital">Rural/Community Hospital</option>
    </select>
  </div>
  <div class="row">
    <label><b>Electrification</b> (multi-select)</label>
    <select id="elecFilter" multiple>
      <option value="Main grid">Main grid</option>
<option value="Mini-grid">Mini-grid</option>
<option value="SHS">SHS</option>
<option value="Unknown">Unknown</option>
    </select>
  </div>
  <button id="applyBtn">Apply filters</button>
  <button id="resetBtn" class="outline">Reset</button>
  <div class="row">
    <button id="exportCSV" class="secondary">Export Favourites (Google My Maps CSV)</button>
  </div>
  <div class="small">Tip: Hold Ctrl/Cmd to select multiple items.</div>
</div>

<div id="footer">Click a marker and use the Favourite button to toggle. Favourites are saved in your browser.</div>

const EXTRA_KEYS = [];

// Map init
const latCenter = FACILITIES.reduce((a,f)=>a+f.lat,0)/FACILITIES.length || -13.5;
const lonCenter = FACILITIES.reduce((a,f)=>a+f.lon,0)/FACILITIES.length || 34.0;
const map = L.map('map').setView([latCenter, lonCenter], 6);

const baseLayers = {
  "OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap'}).addTo(map),
  "CartoDB Positron": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; CartoDB'}),
  "Stamen Terrain": L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/terrain/{z}/{x}/{y}.jpg', { maxZoom: 18, attribution: '&copy; Stamen'})
};
L.control.layers(baseLayers, null, { collapsed: true }).addTo(map);

const cluster = L.markerClusterGroup();
map.addLayer(cluster);

// Favourites
const FAV_KEY = "mw_facility_favs";
function loadFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; } }
function saveFavs(list) { localStorage.setItem(FAV_KEY, JSON.stringify(list)); }
let favourites = new Set(loadFavs());

const defaultIcon = new L.Icon.Default();
const favDivIcon = () => L.divIcon({className:"fav-icon fav-yes", html:"★", iconSize:[20,20], iconAnchor:[10,10]});

let markers = new Map();

function buildPopup(f) {
  const lines = [];
  lines.push(`<div style="font-size:14px"><b>${f.name || 'Unnamed facility'}</b></div>`);
  if (f.facility_type) lines.push(`<div><b>Type:</b> ${f.facility_type}</div>`);
  if (f.electrification_category) lines.push(`<div><b>Electrification:</b> ${f.electrification_category}</div>`);
  if (f.electrification_text) lines.push(`<div><b>Details:</b> ${f.electrification_text}</div>`);
  EXTRA_KEYS.forEach(k => { if (f[k]) lines.push(`<div><b>${k}:</b> ${f[k]}</div>`); });
  lines.push(`<div><b>Coords:</b> ${f.lat.toFixed(5)}, ${f.lon.toFixed(5)}</div>`);
  const isFav = favourites.has(f.id);
  const label = isFav ? "★ Unfavourite" : "☆ Favourite";
  lines.push(`<div style="margin-top:6px"><button onclick="toggleFav('${f.id}')" style="border:1px solid #ddd; background:#fff; border-radius:6px; padding:6px 8px; cursor:pointer;">${label}</button></div>`);
  return lines.join("");
}

function addMarker(f) {
  const isFav = favourites.has(f.id);
  const marker = L.marker([f.lat, f.lon], { icon: isFav ? favDivIcon() : defaultIcon });
  marker.bindPopup(buildPopup(f));
  marker.feature = f;
  markers.set(f.id, marker);
  cluster.addLayer(marker);
}

function clearMarkers() { cluster.clearLayers(); markers.clear(); }

function applyFilters() {
  const types = Array.from(document.getElementById('typeFilter').selectedOptions).map(o=>o.value);
  const elecs = Array.from(document.getElementById('elecFilter').selectedOptions).map(o=>o.value);
  clearMarkers();
  FACILITIES.forEach(f => {
    const typeOK = types.length===0 || types.includes(f.facility_type);
    const elecOK = elecs.length===0 || elecs.includes(f.electrification_category);
    if (typeOK && elecOK) addMarker(f);
  });
}

function resetFilters() {
  document.getElementById('typeFilter').selectedIndex = -1;
  document.getElementById('elecFilter').selectedIndex = -1;
  applyFilters();
}

function toggleFav(id) {
  if (favourites.has(id)) favourites.delete(id); else favourites.add(id);
  saveFavs(Array.from(favourites));
  const m = markers.get(id);
  if (m) {
    const isFav = favourites.has(id);
    m.setIcon(isFav ? favDivIcon() : defaultIcon);
    m.setPopupContent(buildPopup(m.feature));
  }
}

// Export favourites as Google My Maps–ready CSV
function exportFavouritesCSV() {
  const favs = FACILITIES.filter(f => favourites.has(f.id));
  if (favs.length === 0) { alert("No favourites selected."); return; }
  const header = ["Name","Description","Latitude","Longitude"];
  const rows = favs.map(f => [f.name || "", `Type: ${f.facility_type} | Electrification: ${f.electrification_category}`, f.lat, f.lon]);
  const csv = [header].concat(rows).map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type: "text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = "favourites_for_google_my_maps.csv"; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('applyBtn').addEventListener('click', applyFilters);
document.getElementById('resetBtn').addEventListener('click', resetFilters);
document.getElementById('exportCSV').addEventListener('click', exportFavouritesCSV);

// Initial render
applyFilters();
